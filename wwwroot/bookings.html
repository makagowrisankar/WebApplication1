<!DOCTYPE html>
<html>
<head>
    <title>My Bookings</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #5f9cff, #4ecdc4);
        }

        h1 {
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 260px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

            .delete-btn:hover {
                background: darkred;
            }
    </style>
</head>

<body>

    <h1>📋 My Bookings</h1>

    <div id="list"></div>

    <script>
        async function loadBookings() {

            const userEmail = localStorage.getItem("userEmail");

            if (!userEmail) {
                alert("❌ Please login first");
                window.location.href = "login.html";
                return;
            }

            const response = await fetch(`/bookings?email=${userEmail}`);
            const data = await response.json();

            const container = document.getElementById("list");
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = "<p>No bookings yet</p>";
                return;
            }

            data.forEach(b => {
                container.innerHTML += `
                    <div class="card">
                        <h3>${b.providerName}</h3>
                        <p>${b.service}</p>

                        <button onclick="deleteBooking(${b.id})">
                            Delete
                        </button>
                    </div>
                `;
            });
        }

        async function deleteBooking(id) {

            const response = await fetch(`/bookings/${id}`, {
                method: "DELETE"
            });

            const data = await response.json();

            if (data.success) {
                alert("🗑 Deleted");
                loadBookings();
            }
        }

        loadBookings();
    </script>

</body>
</html>
